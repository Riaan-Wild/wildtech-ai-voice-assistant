<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Wild Tech AI Assistant" />
  <title>Wild Tech AI Assistant — Gradient Bold</title>

  <!-- Bot Framework WebChat -->
  <script src="https://cdn.botframework.com/botframework-webchat/latest/webchat.js"></script>

  <style>
    /* =========================
       DESIGN (unchanged)
       ========================= */
    :root {
      --wt-blue: #2563eb;
      --wt-purple: #7c3aed;
      --wt-pink: #ec4899;
      --wt-cyan: #06b6d4;
      --wt-text: #0f172a;
      --wt-text-muted: #64748b;
      --wt-text-light: #94a3b8;
      --wt-surface: #ffffff;
      --wt-border: rgba(15,23,42,0.08);
      --wt-radius: 20px;
      --wt-ease: cubic-bezier(0.22, 1, 0.36, 1);
      --modal-max-width: 960px;
      --modal-height: 90vh;
      --header-height: 60px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: #fafbff;
      color: var(--wt-text);
    }

    .hero {
      background: linear-gradient(135deg,#1e1b4b,#312e81,#4c1d95,#1e1b4b);
      background-size: 300% 300%;
      animation: gradientMove 12s ease infinite;
      padding: 80px 32px;
      text-align: center;
      color: #fff;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .hero h1 { font-size: 28px; margin-bottom: 20px; }
    .hero p { max-width: 520px; margin: 0 auto 32px; }

    .hero-btn {
      padding: 14px 30px;
      border-radius: 999px;
      font-size: 16px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    .hero-btn--primary { background:#fff; color:#312e81; }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.4);
    }

    .overlay.open { display: flex; }

    .modal {
      background: #fff;
      width: min(960px, 100%);
      height: 90vh;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-header {
      background: linear-gradient(135deg,#1e1b4b,#312e81);
      color: #fff;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
    }

    #webchat { flex: 1; }
  </style>
</head>

<body>

<div class="hero">
  <h1>Start your next big idea<br>with a conversation</h1>
  <p>AI‑powered research, insights, and recommendations — instantly.</p>
  <button class="hero-btn hero-btn--primary" onclick="openAssistant()">Start chatting</button>
</div>

<div id="overlay" class="overlay" onclick="if(event.target===this)closeAssistant()">
  <div class="modal">
    <div class="modal-header">
      <strong>Wild Tech Assistant</strong>
      <button onclick="closeAssistant()">✕</button>
    </div>
    <div id="webchat"></div>
  </div>
</div>

<script>


  const SPEECH_KEY   = "Ekq22RwY1llr3ab3MCL5Wu9mxiLbm6omHAtqPuG1dMd820ntSXgRJQQJ99CDACL93NaXJ3w3AAAEACOGBFAz";    
  const SPEECH_REGION = "australiaeast";                      

  const TOKEN_ENDPOINT =
    "https://23f35eb008b6e8ee81b314b56449de.c0.environment.api.powerplatform.com/powervirtualagents/botsbyschema/copilots_header_5f477/directline/token?api-version=2022-03-01-preview";

  /* =========================================================
     DO NOT CHANGE BELOW (unless you know why)
     ========================================================= */

  let rendered = false;

  async function openAssistant() {
    document.getElementById("overlay").classList.add("open");
    document.body.style.overflow = "hidden";

    if (rendered) return;

    const base = TOKEN_ENDPOINT.substring(0, TOKEN_ENDPOINT.indexOf("/powervirtualagents"));
    const apiVersion = TOKEN_ENDPOINT.split("api-version=")[1];
    const settingsUrl = `${base}/powervirtualagents/regionalchannelsettings?api-version=${apiVersion}`;

    const settings = await fetch(settingsUrl).then(r => r.json());
    const token = await fetch(TOKEN_ENDPOINT).then(r => r.json());

    const directLine = window.WebChat.createDirectLine({
      domain: `${settings.channelUrlsById.directline}v3/directline`,
      token: token.token
    });

    let webSpeechPonyfillFactory = null;

    if (window.WebChat.createCognitiveServicesSpeechServicesPonyfillFactory) {
      webSpeechPonyfillFactory =
        await window.WebChat.createCognitiveServicesSpeechServicesPonyfillFactory({
          subscriptionKey: SPEECH_KEY,
          region: SPEECH_REGION
        });
    }

    window.WebChat.renderWebChat(
      { directLine, webSpeechPonyfillFactory },
      document.getElementById("webchat")
    );

    rendered = true;
  }

  function closeAssistant() {
    document.getElementById("overlay").classList.remove("open");
    document.body.style.overflow = "";
  }
</script>

</body>
</html>
